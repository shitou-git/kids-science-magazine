name: Weekly Science Magazine

on:
  schedule:
    # 每周五 UTC 12:00 = 北京时间 20:00
    - cron: '0 12 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly magazine
        env:
          AGENS_AI_API_KEY: ${{ secrets.AGENS_API_KEY }}
        run: |
          python -c "from main import run_weekly_task; run_weekly_task()"

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/archive

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
